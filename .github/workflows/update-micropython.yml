name: Update MicroPython

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new MicroPython release
        id: check
        run: |
          CURRENT=$(grep -oP 'MICROPYTHON_TAG=\Kv[\d.]+' Dockerfile)
          LATEST=$(curl -s https://api.github.com/repos/micropython/micropython/releases/latest | jq -r '.tag_name')

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" != "$LATEST" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile
        if: steps.check.outputs.update == 'true'
        run: |
          sed -i "s/MICROPYTHON_TAG=${{ steps.check.outputs.current }}/MICROPYTHON_TAG=${{ steps.check.outputs.latest }}/" Dockerfile

      - name: Create pull request
        if: steps.check.outputs.update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: deps/micropython-${{ steps.check.outputs.latest }}
          commit-message: 'deps: update MicroPython to ${{ steps.check.outputs.latest }}'
          title: 'deps: update MicroPython to ${{ steps.check.outputs.latest }}'
          body: |
            Updates MicroPython from `${{ steps.check.outputs.current }}` to [`${{ steps.check.outputs.latest }}`](https://github.com/micropython/micropython/releases/tag/${{ steps.check.outputs.latest }}).

            Review the [release notes](https://github.com/micropython/micropython/releases/tag/${{ steps.check.outputs.latest }}) for breaking changes before merging.
