name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v
          # Treat `deps:` commits (e.g. the MicroPython auto-bump) as a patch release
          custom_release_rules: deps:patch:Dependencies

  release:
    needs: tag
    if: needs.tag.outputs.new_tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - name: Build firmware
        run: ./build_firmware.sh

      - name: Bundle release zip
        run: |
          TAG="${{ needs.tag.outputs.new_tag }}"
          STAGE="pico-hid-proxy-${TAG}"
          mkdir -p "$STAGE"
          cp firmware/pico_hid_firmware.uf2 "$STAGE/"
          cp host/setup-windows.bat "$STAGE/"
          cp host/setup-linux.sh "$STAGE/"
          chmod +x "$STAGE/setup-linux.sh"
          zip -r "${STAGE}.zip" "$STAGE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: pico-hid-proxy-${{ needs.tag.outputs.new_tag }}.zip
          generate_release_notes: true
